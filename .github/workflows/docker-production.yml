name: Docker Image CI - SysSoftIntegra Cpe-Sunat Production

on:
  push:
    branches: 
      - "master"

jobs:
  build-and-push:
    name: Build and Push Docker Image to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Configure values in .env
        run: |
          sed -i "s~APP_DEBUG=.*~APP_DEBUG=${{ secrets.APP_DEBUG }}~" .env
          sed -i "s~APP_ENV=.*~APP_ENV=${{ secrets.APP_ENV }}~" .env

      - name: Build Docker image
        run: docker compose -f docker-compose.build.yml build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1 

      - name: Agregar etiqueta latest a la imagen
        run: docker tag cpe-sunat ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/syssoftintegra/cpe-sunat:latest

      - name: Upload image to Amazon ECR
        run: docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/syssoftintegra/cpe-sunat:latest

  deploy-to-runs-on:
    name: Deploy to Production Server
    runs-on: self-hosted
    needs: build-and-push

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1 

      - name: Download image from Amazon ECR
        run: docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/syssoftintegra/cpe-sunat:latest

      - name: Create and run container
        run: docker compose -f docker-compose.yml up -d

      - name: Clean up local Docker images
        run: docker image prune -af || true
    
  clean-ecr-images:
    name: Clear up old images in ECR
    runs-on: ubuntu-latest
    needs: deploy-to-runs-on
    
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Delete old images from ECR
        run: |
          REPO="syssoftintegra/cpe-sunat"
          TAG="latest"

          aws ecr list-images \
          --repository-name "$REPO" \
          --query "imageIds[?type(imageTag)==null || imageTag!='${TAG}']" \
          --output json > images.json

          COUNT=$(jq length images.json)

          if [ "$COUNT" -gt 0 ]; then
            echo "🗑️ Cleaning up $COUNT old images from $REPO..."
            
            aws ecr batch-delete-image \
              --repository-name "$REPO" \
              --image-ids file://images.json
          else
            echo "✅ There are no old images to delete from $REPO."
          fi